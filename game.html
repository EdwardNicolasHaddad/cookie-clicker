<!DOCTYPE html>
<html>
<head>
    <title>Cookie Clicker</title>
    <link rel="stylesheet" href="css/game.css">
</head>

<body>

    <h1>🍪 Cookie Clicker</h1>

    <div id="counter">

        <span id="counter-title">
            CRUMBS
        </span>

        <span id="crumb-count">
            0
        </span>

    </div>

    <img id="cookie" src="images/cookie.png">
    <div id="main-buttons">

        <button class="game-button" id="achievement-button">

            <img src="images/trophy.png">

        </button>


        <button class="game-button" id="world-button">

            <img src="images/cookie-planet.png">

        </button>


        <button class="game-button" id="shop-button">

            <img src="images/shop.png">

        </button>

    </div>
    <div id="achievement-panel">

        <div class="panel-header">

            <h2>Achievements</h2>

        </div>

    </div>
    
    <button id="logout-button" onclick="logout()">
        Logout
    </button>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>
    <script src="js/game.js"></script>
    
</body>
</html>
